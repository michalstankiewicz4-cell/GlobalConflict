<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Data Center — Global Surveillance Network</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050a14; font-family: 'Courier New', monospace; color: #c8d8f0; overflow: hidden; height: 100vh; }
#globe-container { width: 100vw; height: 100vh; }

#stats-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(5,10,20,0.80);
  border-top: 1px solid rgba(40,80,160,0.3);
  display: flex; padding: 8px 28px; gap: 36px;
  backdrop-filter: blur(6px); z-index: 10;
}
.stat { display: flex; flex-direction: column; gap: 1px; }
.stat-val { font-size: 16px; color: #5bf; font-weight: 700; letter-spacing: 1px; }
.stat-lbl { font-size: 9px; color: rgba(100,150,200,0.5); letter-spacing: 2px; text-transform: uppercase; }

#logo {
  position: fixed; top: 18px; left: 24px; z-index: 10;
}
#logo h1 {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 3px;
  color: #5bf;
  text-transform: uppercase;
}
#logo p  { font-size: 10px; color: rgba(100,160,220,0.5); letter-spacing: 3px; margin-top: 2px; text-transform: uppercase; }

#selected-country-name {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  padding: 6px 12px;
  border: 1px solid rgba(115, 190, 255, 0.3);
  border-radius: 999px;
  background: rgba(8, 18, 32, 0.62);
  color: rgba(225, 241, 255, 0.9);
  font-size: 11px;
  letter-spacing: 1.6px;
  text-transform: none;
}

#layer-panel {
  position: fixed; top: 92px; left: 24px; z-index: 10;
  display: grid; gap: 12px;
  width: min(280px, calc(100vw - 48px));
}

.layer-tile {
  position: relative;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 14px 16px;
  border: 1px solid rgba(120, 180, 255, 0.24);
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(11, 20, 36, 0.72), rgba(18, 39, 74, 0.34));
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.24);
  backdrop-filter: blur(14px);
  color: #dcecff;
  cursor: pointer;
  transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease, opacity 0.25s ease;
}

.layer-tile:hover {
  transform: translateX(4px);
  border-color: rgba(120, 190, 255, 0.5);
}

.layer-tile.is-off {
  opacity: 0.58;
  background: linear-gradient(135deg, rgba(8, 14, 24, 0.5), rgba(10, 22, 40, 0.24));
}

.tile-emoji {
  width: 42px;
  height: 42px;
  display: grid;
  place-items: center;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.08);
  font-size: 22px;
}

.tile-copy {
  display: grid;
  gap: 3px;
  text-align: left;
}

.tile-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.8px;
  text-transform: uppercase;
}

.tile-meta {
  font-size: 10px;
  color: rgba(185, 214, 255, 0.68);
  letter-spacing: 1.2px;
}

.tile-state {
  min-width: 52px;
  padding: 7px 9px;
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.16);
  background: rgba(255, 255, 255, 0.06);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  text-align: center;
}

.layer-tile[data-layer="camera"] .tile-emoji { box-shadow: inset 0 0 0 1px rgba(255, 122, 89, 0.25); }
.layer-tile[data-layer="capital"] .tile-emoji { box-shadow: inset 0 0 0 1px rgba(0, 255, 136, 0.25); }
.layer-tile[data-layer="city"] .tile-emoji { box-shadow: inset 0 0 0 1px rgba(255, 95, 95, 0.25); }
.layer-tile[data-layer="airport"] .tile-emoji { box-shadow: inset 0 0 0 1px rgba(76, 214, 255, 0.3); }

.tile-action-btn {
  margin-top: 6px;
  width: fit-content;
  padding: 5px 10px;
  border-radius: 999px;
  border: 1px solid rgba(128, 220, 255, 0.45);
  background: rgba(54, 132, 168, 0.28);
  color: #bfefff;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s ease, border-color 0.2s ease;
}

.tile-action-btn:hover {
  background: rgba(74, 168, 214, 0.42);
  border-color: rgba(140, 224, 255, 0.8);
}

.tile-action-btn.is-active {
  background: rgba(64, 219, 153, 0.22);
  border-color: rgba(90, 255, 194, 0.8);
  color: #c8ffe9;
}

.globe-emoji {
  font-size: 16.8px;
  line-height: 1;
  filter: drop-shadow(0 3px 12px rgba(0, 0, 0, 0.35));
  transform: translate(-50%, -50%) scale(var(--emoji-scale, 1));
  transform-origin: center;
  opacity: var(--emoji-opacity, 1);
  user-select: none;
  pointer-events: none;
  will-change: transform, opacity;
}

@media (max-width: 760px) {
  #logo { left: 16px; top: 14px; }
  #layer-panel {
    top: auto;
    bottom: 78px;
    left: 16px;
    right: 16px;
    width: auto;
  }

  .layer-tile {
    padding: 12px 14px;
    grid-template-columns: auto 1fr auto;
  }

  #stats-bar {
    padding: 8px 14px;
    gap: 18px;
    overflow-x: auto;
  }
}
</style>
</head>

function toRadians(value) {
  return value * Math.PI / 180;
}

function normalizeCountryKey(value) {
  return String(value || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-zA-Z0-9]+/g, ' ')
    .trim()
    .toLowerCase();
}

function canonicalCountryName(value) {
  const normalized = normalizeCountryKey(value);
  return countryAliases.get(normalized) || value || 'Nieznany kraj';
}

function getFeatureCountryKey(feature) {
  return normalizeCountryKey(canonicalCountryName(feature?.properties?.ADMIN || feature?.properties?.name || ''));
}

function isSelectedFeature(feature) {
  return Boolean(selectedCountryKey) && getFeatureCountryKey(feature) === selectedCountryKey;
}

function getAngularDistance(latA, lngA, latB, lngB) {
  const lat1 = toRadians(latA);
  const lat2 = toRadians(latB);
  const deltaLng = toRadians(lngA - lngB);
  const cosine = Math.sin(lat1) * Math.sin(lat2) + Math.cos(lat1) * Math.cos(lat2) * Math.cos(deltaLng);

  return Math.acos(Math.min(1, Math.max(-1, cosine)));
}

function updateEmojiScale() {
  const pov = globe.pointOfView();
  const altitudeFactor = Math.max(0.82, Math.min(1.15, 1.16 - (((pov.altitude ?? 2) - 2) * 0.08)));

  getVisiblePoints().forEach(point => {
    if (!point._emojiElement) {
      return;
    }

    const angle = getAngularDistance(point.lat, point.lng, pov.lat, pov.lng);
    const visibility = Math.max(0, Math.cos(angle));
    const scale = (0.5 + visibility * 0.7) * altitudeFactor;
    const opacity = 0.18 + visibility * 0.82;

    point._emojiElement.style.setProperty('--emoji-scale', scale.toFixed(3));
    point._emojiElement.style.setProperty('--emoji-opacity', opacity.toFixed(3));
  });
}

function startEmojiScaleLoop() {
  const tick = () => {
    updateEmojiScale();
    requestAnimationFrame(tick);
  };

  requestAnimationFrame(tick);
}

function getVisiblePoints() {
  return Object.entries(layerConfig)
    .filter(([key]) => layerState[key])

function getCountryPoints(countryName) {
  const countryKey = normalizeCountryKey(countryName);
  return allDataPoints.filter(point => normalizeCountryKey(canonicalCountryName(point.country)) === countryKey);
}

function updateCountryStats() {
  const countryPoints = selectedCountryKey ? getCountryPoints(selectedCountryLabel) : [];
  const capitalsCount = countryPoints.filter(point => point.type === 'capital').length;
  const citiesCount = countryPoints.filter(point => point.type === 'city').length;
  const camerasCount = countryPoints.filter(point => point.type === 'camera').length;
  const airportsCount = countryPoints.filter(point => point.type === 'airport').length;

  countryStatsElements.capitals.textContent = capitalsCount.toLocaleString('pl-PL');
  countryStatsElements.cities.textContent = citiesCount.toLocaleString('pl-PL');
  countryStatsElements.cameras.textContent = camerasCount.toLocaleString('pl-PL');
  countryStatsElements.airports.textContent = airportsCount.toLocaleString('pl-PL');
  selectedCountryNameElement.textContent = selectedCountryLabel;
}

function setSendMode(active) {
  sendModeActive = active;
  sendFlightButton.classList.toggle('is-active', active);
  sendFlightButton.textContent = active ? 'Target' : 'Send';
  airportSendStatusElement.textContent = active ? 'Kliknij kraj docelowy' : 'Tryb standardowy';
}

function flattenCoordinates(coords, out) {
  if (!Array.isArray(coords) || coords.length === 0) {
    return;
  }

  if (typeof coords[0] === 'number') {
    out.push({ lng: coords[0], lat: coords[1] });
    return;
  }

  coords.forEach(entry => flattenCoordinates(entry, out));
}

function getFeatureCenter(feature) {
  const points = [];
  flattenCoordinates(feature?.geometry?.coordinates, points);
  if (!points.length) {
    return null;
  }

  const sum = points.reduce((acc, point) => {
    acc.lat += point.lat;
    acc.lng += point.lng;
    return acc;
  }, { lat: 0, lng: 0 });

  return {
    lat: sum.lat / points.length,
    lng: sum.lng / points.length,
  };
}

function addLandingEffect(destination) {
  const landing = {
    id: `${Date.now()}-${Math.random()}`,
    lat: destination.lat,
    lng: destination.lng,
    maxRadius: 4.5,
    speed: 2.6,
    color: t => `rgba(126, 233, 255, ${Math.max(0, 0.72 * (1 - t))})`,
  };

  activeLandings.push(landing);
  globe.ringsData([...activeLandings]);

  setTimeout(() => {
    const landingIndex = activeLandings.findIndex(item => item.id === landing.id);
    if (landingIndex !== -1) {
      activeLandings.splice(landingIndex, 1);
      globe.ringsData([...activeLandings]);
    }
  }, 1700);
}

function sendFlightToCountry(feature) {
  const destination = getFeatureCenter(feature);
  if (!destination) {
    setSendMode(false);
    return;
  }

  const flight = {
    id: `${Date.now()}-${Math.random()}`,
    startLat: flightOrigin.lat,
    startLng: flightOrigin.lng,
    endLat: destination.lat,
    endLng: destination.lng,
    altitude: 0.31,
    duration: 2600,
    color: ['#74dcff', '#ffffff'],
  };

  activeFlights.push(flight);
  globe.arcsData([...activeFlights]);

  setTimeout(() => {
    const flightIndex = activeFlights.findIndex(item => item.id === flight.id);
    if (flightIndex !== -1) {
      activeFlights.splice(flightIndex, 1);
      globe.arcsData([...activeFlights]);
      addLandingEffect(destination);
    }
  }, flight.duration + 120);

  setSendMode(false);
}

function selectCountry(feature) {
  if (!feature) {
    return;
  }

  const clickedKey = getFeatureCountryKey(feature);
  const clickedLabel = canonicalCountryName(feature.properties?.ADMIN || feature.properties?.name || '');

  if (sendModeActive) {
    selectedCountryKey = clickedKey;
    selectedCountryLabel = clickedLabel;
    updateCountryStats();
    refreshCountryHighlight();
    sendFlightToCountry(feature);
    return;
  }

  if (selectedCountryKey === clickedKey) {
    selectedCountryKey = '';
    selectedCountryLabel = 'Kliknij kraj';
  } else {
    selectedCountryKey = clickedKey;
    selectedCountryLabel = clickedLabel;
  }

  updateCountryStats();
  refreshCountryHighlight();
}

function syncLayerButtons() {
  layerButtons.forEach(button => {
    const layerKey = button.dataset.layer;
    const enabled = layerState[layerKey];
    button.classList.toggle('is-off', !enabled);
    button.classList.toggle('is-on', enabled);
    button.setAttribute('aria-pressed', String(enabled));
    button.querySelector('.tile-state').textContent = enabled ? 'ON' : 'OFF';
  });
}

function updateLayers() {
  const visiblePoints = getVisiblePoints();
  globe.pointsData(visiblePoints);
  globe.htmlElementsData(visiblePoints);
  syncLayerButtons();
  requestAnimationFrame(updateEmojiScale);
}

  button.addEventListener('click', () => {
    const layerKey = button.dataset.layer;
    layerState[layerKey] = !layerState[layerKey];
    if (layerKey === 'airport' && !layerState[layerKey]) {
      setSendMode(false);
    }
    updateLayers();
  });

  button.addEventListener('keydown', event => {
    if ((event.key === 'Enter' || event.key === ' ') && button.tagName !== 'BUTTON') {
      event.preventDefault();
      button.click();
    }
  });
});

  if (!layerState.airport) {
    layerState.airport = true;
    updateLayers();
  }
  setSendMode(!sendModeActive);
});
